name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 혹은 사용 중인 메인 브랜치 이름

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_WEATHER_API_KEY: ${{ secrets.VITE_WEATHER_API_KEY }}
          VITE_RECIPE_API_KEY: ${{ secrets.VITE_RECIPE_API_KEY }}
          VITE_WEATHER_PROXY_URL: ${{ secrets.VITE_WEATHER_PROXY_URL }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
